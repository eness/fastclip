name: build-win-exe

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ClipboardToSelectedFile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish framework-dependent build
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained false
          -o publish/framework-dependent

      - name: Publish self-contained exe
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          -o publish/self-contained

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardToSelectedFile-framework-dependent-win-x64
          path: ClipboardToSelectedFile/publish/framework-dependent/

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardToSelectedFile-self-contained-win-x64
          path: ClipboardToSelectedFile/publish/self-contained/
